name: Build C# Executable

on:
  push:
    branches: [ "main" ] # mainブランチにプッシュされたら起動
  workflow_dispatch: # 手動実行も可能にする

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    # .NET Framework (net48) プロジェクトのため、単一ファイル発行(PublishSingleFile)等の
    # .NET Core 以降専用のオプションは使用できません。
    # ソリューション単位での出力エラーを防ぐため、プロジェクトファイルを明示的に指定してパブリッシュします。
    - name: Publish Executable
      run: |
        dotnet publish ClipHistory/ClipHistory.csproj -c Release -o ./publish_output

    # 出来上がったEXEファイルと依存DLL群をGitHub上に保存
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: ./publish_output/
