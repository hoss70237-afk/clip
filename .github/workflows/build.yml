name: Build C# Executable

on:
  push:
    branches: [ "main" ] # mainブランチにプッシュされたら起動
  workflow_dispatch: # 手動実行も可能にする

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # 生成AIが作った.NETのバージョンに合わせて変更してください（6.0, 7.0, 8.0など）

    # 依存関係の復元とビルド（1つのEXEにまとめる設定）
    - name: Publish Single File EXE
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true -o ./publish_output

    # 出来上がったEXEファイルをGitHub上に保存
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: ./publish_output/
